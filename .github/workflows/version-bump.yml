name: Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - android/app/build.gradle
      - ios/Tricordarr.xcodeproj/project.pbxproj
      - package.json

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(bash scripts/bump-version.sh)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle ios/Tricordarr.xcodeproj/project.pbxproj package.json
          git commit -m "${{ steps.bump.outputs.version }}"
          git push
